interface:
  display_name: "session-handsoff"
  short_description: "Reads the current session context and prints a structured handoff block to the terminal — what was done, what's still to do, and exactly where the next session should start. Invoke with /session-handsoff in Claude Code or $session-handsoff in Codex"
  default_prompt: "Use $session-handsoff to hands off the task to next session."

policy:
  allow_implicit_invocation: false
